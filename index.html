<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informe de estrategia de carrera | be-long run</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f4f1ea;
      color: #1f241f;
    }

    header {
      background: #202820;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    main {
      max-width: 1150px;
      margin: auto;
      padding: 24px 16px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
    }

    label {
      display: block;
      font-weight: 700;
      margin-top: 16px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #bbb;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #202820;
      color: white;
      font-weight: 800;
      border: none;
      cursor: pointer;
      margin-top: 24px;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
    }

    .metric {
      background: #f0f2ed;
      padding: 16px;
      border-radius: 14px;
    }

    .metric strong {
      display: block;
      font-size: 25px;
      margin-top: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #eef0ea;
    }

    .tag {
      color: white;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      display: inline-block;
    }

    .warning {
      background: #fff5d6;
      border-left: 5px solid #d09a00;
      padding: 14px;
      border-radius: 8px;
      margin-top: 18px;
    }

    .error {
      background: #ffe1e1;
      border-left: 5px solid #b00020;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    svg {
      width: 100%;
      height: 360px;
      background: #f8f8f5;
      border-radius: 14px;
      margin-top: 16px;
    }
  </style>
</head>

<body>
<header>
  <h1>Informe de estrategia de carrera</h1>
  <p>Análisis del recorrido, demandas principales y planificación global.</p>
</header>

<main>
  <section class="card">
    <h2>Datos de entrada</h2>

    <label>Archivo GPX</label>
    <input type="file" id="gpxFile" accept=".gpx,.xml" />

    <label>Tiempo previsto de carrera</label>
    <div class="time-grid">
      <input type="number" id="hours" min="0" value="8" placeholder="Horas">
      <input type="number" id="minutes" min="0" max="59" value="0" placeholder="Minutos">
      <input type="number" id="seconds" min="0" max="59" value="0" placeholder="Segundos">
    </div>

    <label>Semanas disponibles hasta la carrera</label>
    <input type="number" id="weeks" min="1" value="24">

    <button id="generateBtn">Generar informe</button>
  </section>

  <section id="results"></section>
</main>

<script>
document.getElementById("generateBtn").addEventListener("click", handleGPX);

const terrainColors = {
  "Subida fuerte": "#8b1e1e",
  "Subida moderada": "#d65a31",
  "Subida suave": "#e6a23c",
  "Llano / ondulado": "#4f7cac",
  "Bajada suave": "#62a87c",
  "Bajada moderada": "#2f855a",
  "Bajada fuerte": "#1b5e3c"
};

function showError(message) {
  document.getElementById("results").innerHTML = `
    <div class="error"><strong>Error:</strong> ${message}</div>
  `;
}

function toRad(x) {
  return x * Math.PI / 180;
}

function distanceMeters(a, b) {
  const R = 6371000;
  const dLat = toRad(b.lat - a.lat);
  const dLon = toRad(b.lon - a.lon);

  const h =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(a.lat)) *
    Math.cos(toRad(b.lat)) *
    Math.sin(dLon / 2) ** 2;

  return 2 * R * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
}

function classifySlope(slope) {
  if (slope >= 15) return "Subida fuerte";
  if (slope >= 8) return "Subida moderada";
  if (slope >= 3) return "Subida suave";
  if (slope <= -15) return "Bajada fuerte";
  if (slope <= -8) return "Bajada moderada";
  if (slope <= -3) return "Bajada suave";
  return "Llano / ondulado";
}

function smooth(points, windowSize = 5) {
  return points.map((p, i) => {
    let start = Math.max(0, i - windowSize);
    let end = Math.min(points.length - 1, i + windowSize);
    let sum = 0;
    let count = 0;

    for (let j = start; j <= end; j++) {
      sum += points[j].ele;
      count++;
    }

    return { ...p, ele: sum / count };
  });
}

function handleGPX() {
  const file = document.getElementById("gpxFile").files[0];

  if (!file) {
    showError("Sube primero un archivo GPX.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    try {
      const xml = new DOMParser().parseFromString(event.target.result, "text/xml");

      const parserError = xml.querySelector("parsererror");
      if (parserError) {
        showError("El archivo no parece ser un GPX válido.");
        return;
      }

      const trkpts = Array.from(xml.getElementsByTagName("trkpt"));

      if (trkpts.length < 2) {
        showError("No se han encontrado puntos de track en el GPX.");
        return;
      }

      let points = trkpts.map(pt => {
        const eleNode = pt.getElementsByTagName("ele")[0];

        return {
          lat: Number(pt.getAttribute("lat")),
          lon: Number(pt.getAttribute("lon")),
          ele: eleNode ? Number(eleNode.textContent) : NaN
        };
      }).filter(p =>
        Number.isFinite(p.lat) &&
        Number.isFinite(p.lon) &&
        Number.isFinite(p.ele)
      );

      if (points.length < 10) {
        showError("El GPX tiene pocos puntos válidos o no contiene altitud.");
        return;
      }

      analyzeRoute(smooth(points));
    } catch (err) {
      showError("Ha ocurrido un problema leyendo el GPX: " + err.message);
    }
  };

  reader.onerror = function() {
    showError("No se ha podido leer el archivo.");
  };

  reader.readAsText(file);
}

function analyzeRoute(points) {
  let totalDistance = 0;
  let gain = 0;
  let loss = 0;

  const terrain = {
    "Subida fuerte": 0,
    "Subida moderada": 0,
    "Subida suave": 0,
    "Llano / ondulado": 0,
    "Bajada suave": 0,
    "Bajada moderada": 0,
    "Bajada fuerte": 0
  };

  const profile = [];
  const segments = [];

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const curr = points[i];

    const dist = distanceMeters(prev, curr);
    if (dist < 1 || dist > 500) continue;

    const diff = curr.ele - prev.ele;
    const slope = (diff / dist) * 100;
    const type = classifySlope(slope);

    const kmStart = totalDistance / 1000;
    totalDistance += dist;
    const kmEnd = totalDistance / 1000;

    if (diff > 0) gain += diff;
    if (diff < 0) loss += Math.abs(diff);

    terrain[type] += dist;

    const point = {
      km: kmEnd,
      ele: curr.ele,
      slope,
      type
    };

    profile.push(point);

    segments.push({
      kmStart,
      kmEnd,
      distance: dist,
      elevationDiff: diff,
      slope,
      type
    });
  }

  if (totalDistance <= 0) {
    showError("No se ha podido calcular la distancia del recorrido.");
    return;
  }

  const climbs = detectBlocks(segments, "climb");
  const descents = detectBlocks(segments, "descent");

  generateReport({
    totalKm: totalDistance / 1000,
    gain,
    loss,
    terrain,
    profile,
    climbs,
    descents
  });
}

function detectBlocks(segments, mode) {
  const blocks = [];
  let block = null;

  const minNetVertical = 50;
  const allowedCounterVertical = 30;

  function isMain(s) {
    return mode === "climb" ? s.elevationDiff > 0 : s.elevationDiff < 0;
  }

  for (const s of segments) {
    if (!block) {
      if (isMain(s)) {
        block = {
          kmStart: s.kmStart,
          kmEnd: s.kmEnd,
          distance: s.distance,
          positive: Math.max(0, s.elevationDiff),
          negative: Math.max(0, -s.elevationDiff),
          counter: 0
        };
      }
      continue;
    }

    block.kmEnd = s.kmEnd;
    block.distance += s.distance;
    block.positive += Math.max(0, s.elevationDiff);
    block.negative += Math.max(0, -s.elevationDiff);

    if (!isMain(s)) {
      block.counter += Math.abs(s.elevationDiff);
    }

    if (block.counter > allowedCounterVertical) {
      closeBlock();
      block = null;
    }
  }

  if (block) closeBlock();

  function closeBlock() {
    const net = mode === "climb"
      ? block.positive - block.negative
      : block.negative - block.positive;

    if (net >= minNetVertical) {
      block.netVertical = net;
      block.avgSlope = (net / block.distance) * 100;
      blocks.push(block);
    }
  }

  return blocks;
}

function durationHours() {
  const h = Number(document.getElementById("hours").value || 0);
  const m = Number(document.getElementById("minutes").value || 0);
  const s = Number(document.getElementById("seconds").value || 0);
  return h + m / 60 + s / 3600;
}

function getPlanning(weeks) {
  weeks = Math.max(1, Number(weeks || 1));

  if (weeks >= 24) {
    const base = Math.round(weeks * 0.45);
    const specific = Math.round(weeks * 0.32);
    const competitive = Math.round(weeks * 0.15);
    const taper = Math.max(1, weeks - base - specific - competitive);

    return [
      ["Base general", base, "Volumen progresivo, fuerza general, continuidad, técnica básica y desarrollo aeróbico."],
      ["Desarrollo específico", specific, "Subidas, bajadas, desnivel, tiradas largas específicas y nutrición."],
      ["Preparación competitiva", competitive, "Simulaciones parciales, estrategia por tramos, material y ritmos/intensidades objetivo."],
      ["Taper", taper, "Reducir fatiga, mantener activación y llegar con frescura."]
    ];
  }

  if (weeks >= 12) {
    const base = Math.round(weeks * 0.35);
    const specific = Math.round(weeks * 0.45);
    const taper = weeks - base - specific;

    return [
      ["Base orientada", base, "Consolidar volumen, fuerza y tolerancia muscular."],
      ["Bloque específico", specific, "Priorizar las demandas principales del recorrido."],
      ["Afinamiento", Math.max(1, taper), "Simular, ajustar y descargar."]
    ];
  }

  const specific = Math.max(1, weeks - 2);

  return [
    ["Especificidad prioritaria", specific, "Trabajar lo más determinante del recorrido sin cambios bruscos."],
    ["Taper", Math.min(2, weeks), "Llegar fresco, sano y con estrategia clara."]
  ];
}

function getRaceType(data) {
  const mPerKm = data.gain / data.totalKm;
  const bigClimb = data.climbs.some(c => c.netVertical >= 700);
  const bigDescent = data.descents.some(d => d.netVertical >= 700);

  if (bigClimb) return "Carrera con grandes ascensiones sostenidas";
  if (bigDescent) return "Carrera con bajadas largas y alta exigencia excéntrica";
  if (mPerKm >= 80) return "Trail de montaña muy condicionado por el desnivel";
  if (mPerKm <= 30) return "Carrera rápida con mucho terreno corrible";
  return "Trail mixto con demandas combinadas";
}

function recommendations(data) {
  const recs = [];
  const h = durationHours();
  const mPerKm = data.gain / data.totalKm;

  if (data.climbs.some(c => c.netVertical >= 500)) {
    recs.push("Entrenar subidas largas de 30-60 minutos, alternando carrera y marcha cuando la pendiente lo exija.");
    recs.push("Practicar el uso de bastones si las pendientes largas superan aproximadamente el 12-15%.");
  }

  if (data.descents.some(d => d.netVertical >= 500)) {
    recs.push("Introducir bajadas largas de forma progresiva para mejorar tolerancia excéntrica sin generar daño excesivo.");
    recs.push("Mantener fuerza de cuádriceps, sóleo, glúteo medio y estabilidad de tronco durante toda la preparación.");
  }

  if (mPerKm > 70) {
    recs.push("En el bloque específico, dar más importancia a los metros positivos semanales que a los kilómetros totales.");
  }

  if (h >= 5) {
    recs.push("Diseñar una estrategia nutricional por hora y probarla en tiradas largas antes de competir.");
    recs.push("Planificar la carrera por esfuerzo y por tramos, no por ritmo medio.");
  }

  if (h >= 10) {
    recs.push("Simular situaciones de fatiga acumulada: subir y bajar después de varias horas, no solo en fresco.");
    recs.push("Testar material, sales, cafeína, ropa y avituallamientos en entrenamientos específicos.");
  }

  if (recs.length === 0) {
    recs.push("Priorizar continuidad aeróbica, economía de carrera y sesiones en terreno similar al de competición.");
  }

  return recs;
}

function renderProfile(profile) {
  if (!profile.length) return "<p>No se ha podido generar el perfil.</p>";

  const width = 1000;
  const height = 320;
  const pad = 35;

  const maxKm = Math.max(...profile.map(p => p.km));
  const minEle = Math.min(...profile.map(p => p.ele));
  const maxEle = Math.max(...profile.map(p => p.ele));

  function x(km) {
    return pad + (km / maxKm) * (width - pad * 2);
  }

  function y(ele) {
    return height - pad - ((ele - minEle) / Math.max(1, maxEle - minEle)) * (height - pad * 2);
  }

  let lines = "";

  for (let i = 1; i < profile.length; i += 3) {
    const a = profile[i - 1];
    const b = profile[i];

    lines += `
      <line
        x1="${x(a.km)}"
        y1="${y(a.ele)}"
        x2="${x(b.km)}"
        y2="${y(b.ele)}"
        stroke="${terrainColors[b.type]}"
        stroke-width="3"
      />
    `;
  }

  return `
    <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
      <line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="#999" />
      <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" stroke="#999" />
      ${lines}
      <text x="${pad}" y="20" font-size="14">${Math.round(maxEle)} m</text>
      <text x="${pad}" y="${height - 8}" font-size="14">${Math.round(minEle)} m</text>
      <text x="${width - 90}" y="${height - 8}" font-size="14">${maxKm.toFixed(1)} km</text>
    </svg>
  `;
}

function generateReport(data) {
  const weeks = Number(document.getElementById("weeks").value || 1);
  const h = Math.max(0.1, durationHours());
  const totalMeters = data.totalKm * 1000;
  const plan = getPlanning(weeks);
  const raceType = getRaceType(data);
  const recs = recommendations(data);

  document.getElementById("results").innerHTML = `
    <section class="card">
      <h2>Resumen del recorrido</h2>
      <div class="grid">
        <div class="metric">Distancia<strong>${data.totalKm.toFixed(1)} km</strong></div>
        <div class="metric">Desnivel positivo<strong>${Math.round(data.gain)} m+</strong></div>
        <div class="metric">Desnivel negativo<strong>${Math.round(data.loss)} m-</strong></div>
        <div class="metric">Ratio desnivel<strong>${Math.round(data.gain / data.totalKm)} m+/km</strong></div>
        <div class="metric">Tiempo previsto<strong>${h.toFixed(2)} h</strong></div>
        <div class="metric">Velocidad media prevista<strong>${(data.totalKm / h).toFixed(2)} km/h</strong></div>
      </div>
      <p><strong>Tipo de carrera:</strong> ${raceType}</p>
    </section>

    <section class="card">
      <h2>Perfil altimétrico coloreado por pendiente</h2>
      ${renderProfile(data.profile)}
    </section>

    <section class="card">
      <h2>Distribución del terreno</h2>
      <table>
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Kilómetros</th>
            <th>Porcentaje</th>
          </tr>
        </thead>
        <tbody>
          ${Object.entries(data.terrain).map(([type, meters]) => `
            <tr>
              <td><span class="tag" style="background:${terrainColors[type]}">${type}</span></td>
              <td>${(meters / 1000).toFixed(2)} km</td>
              <td>${((meters / totalMeters) * 100).toFixed(1)}%</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2>Subidas detectadas ≥ 50 m+</h2>
      ${blocksTable(data.climbs, "+")}

      <h2>Bajadas detectadas ≥ 50 m-</h2>
      ${blocksTable(data.descents, "-")}
    </section>

    <section class="card">
      <h2>Planificación global recomendada</h2>
      <table>
        <thead>
          <tr>
            <th>Fase</th>
            <th>Semanas</th>
            <th>Objetivo</th>
          </tr>
        </thead>
        <tbody>
          ${plan.map(p => `
            <tr>
              <td><strong>${p[0]}</strong></td>
              <td>${p[1]}</td>
              <td>${p[2]}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2>Recomendaciones específicas</h2>
      <ul>
        ${recs.map(r => `<li>${r}</li>`).join("")}
      </ul>

      <div class="warning">
        Informe orientativo. Para una planificación real habría que cruzarlo con historial, disponibilidad, lesiones, nivel actual, experiencia, tolerancia nutricional y objetivos.
      </div>
    </section>
  `;
}

function blocksTable(blocks, sign) {
  if (!blocks.length) {
    return "<p>No se detectan bloques relevantes.</p>";
  }

  return `
    <table>
      <thead>
        <tr>
          <th>Tramo</th>
          <th>Distancia</th>
          <th>Desnivel neto</th>
          <th>Pendiente media</th>
        </tr>
      </thead>
      <tbody>
        ${blocks.map(b => `
          <tr>
            <td>km ${b.kmStart.toFixed(1)} - ${b.kmEnd.toFixed(1)}</td>
            <td>${(b.distance / 1000).toFixed(2)} km</td>
            <td>${Math.round(b.netVertical)} m${sign}</td>
            <td>${b.avgSlope.toFixed(1)}%</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}
</script>
</body>
</html>
