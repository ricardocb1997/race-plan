<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informe de estrategia de carrera | be-long run</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f4f1ea;
      color: #1f241f;
    }

    header {
      background: #202820;
      color: white;
      padding: 42px 20px;
      text-align: center;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: 700;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #bbb;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 24px;
      background: #202820;
      color: white;
      font-weight: 800;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #3b4b3a;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
    }

    .metric {
      background: #f0f2ed;
      padding: 16px;
      border-radius: 14px;
    }

    .metric strong {
      display: block;
      font-size: 26px;
      margin-top: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      padding: 11px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #eef0ea;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: white;
    }

    .warning {
      background: #fff5d6;
      border-left: 5px solid #d09a00;
      padding: 14px;
      border-radius: 8px;
      margin-top: 18px;
    }

    .small {
      font-size: 14px;
      color: #666;
    }

    canvas {
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Informe de estrategia de carrera</h1>
    <p>Análisis del recorrido, demandas principales y planificación global de preparación.</p>
  </header>

  <main>
    <section class="card">
      <h2>Datos de entrada</h2>

      <label for="gpxFile">Archivo GPX</label>
      <input type="file" id="gpxFile" accept=".gpx" />

      <label>Tiempo previsto de carrera</label>
      <div class="time-grid">
        <input type="number" id="hours" min="0" value="8" placeholder="Horas" />
        <input type="number" id="minutes" min="0" max="59" value="0" placeholder="Minutos" />
        <input type="number" id="seconds" min="0" max="59" value="0" placeholder="Segundos" />
      </div>

      <label for="weeks">Semanas disponibles hasta la carrera</label>
      <input type="number" id="weeks" min="1" value="24" />

      <button onclick="handleGPX()">Generar informe</button>
    </section>

    <section id="results"></section>
  </main>

<script>
let profileChart = null;

const terrainColors = {
  "Subida fuerte": "#8b1e1e",
  "Subida moderada": "#d65a31",
  "Subida suave": "#e6a23c",
  "Llano / ondulado": "#4f7cac",
  "Bajada suave": "#62a87c",
  "Bajada moderada": "#2f855a",
  "Bajada fuerte": "#1b5e3c"
};

function toRadians(deg) {
  return deg * Math.PI / 180;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRadians(lat2 - lat1);
  const dLon = toRadians(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRadians(lat1)) *
    Math.cos(toRadians(lat2)) *
    Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function classifySlope(slope) {
  if (slope >= 15) return "Subida fuerte";
  if (slope >= 8) return "Subida moderada";
  if (slope >= 3) return "Subida suave";
  if (slope <= -15) return "Bajada fuerte";
  if (slope <= -8) return "Bajada moderada";
  if (slope <= -3) return "Bajada suave";
  return "Llano / ondulado";
}

function smoothElevations(points, windowSize = 5) {
  return points.map((p, i) => {
    let start = Math.max(0, i - windowSize);
    let end = Math.min(points.length - 1, i + windowSize);
    let sum = 0;
    let count = 0;

    for (let j = start; j <= end; j++) {
      sum += points[j].ele;
      count++;
    }

    return { ...p, eleSmooth: sum / count };
  });
}

function handleGPX() {
  const file = document.getElementById("gpxFile").files[0];

  if (!file) {
    alert("Sube un archivo GPX.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const xml = new DOMParser().parseFromString(e.target.result, "application/xml");

    const points = Array.from(xml.getElementsByTagName("trkpt"))
      .map(pt => ({
        lat: parseFloat(pt.getAttribute("lat")),
        lon: parseFloat(pt.getAttribute("lon")),
        ele: parseFloat(pt.getElementsByTagName("ele")[0]?.textContent || 0)
      }))
      .filter(p => !isNaN(p.lat) && !isNaN(p.lon) && !isNaN(p.ele));

    if (points.length < 10) {
      alert("El GPX no tiene suficientes puntos válidos.");
      return;
    }

    analyzeRoute(smoothElevations(points));
  };

  reader.readAsText(file);
}

function analyzeRoute(points) {
  let totalDistance = 0;
  let gain = 0;
  let loss = 0;

  const terrain = {
    "Subida fuerte": 0,
    "Subida moderada": 0,
    "Subida suave": 0,
    "Llano / ondulado": 0,
    "Bajada suave": 0,
    "Bajada moderada": 0,
    "Bajada fuerte": 0
  };

  const profile = [];
  const segments = [];

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const curr = points[i];

    const dist = haversine(prev.lat, prev.lon, curr.lat, curr.lon);
    if (dist < 1 || dist > 300) continue;

    const diff = curr.eleSmooth - prev.eleSmooth;
    const slope = diff / dist * 100;
    const type = classifySlope(slope);

    totalDistance += dist;

    if (diff > 0) gain += diff;
    if (diff < 0) loss += Math.abs(diff);

    terrain[type] += dist;

    profile.push({
      km: totalDistance / 1000,
      ele: curr.eleSmooth,
      slope,
      type
    });

    segments.push({
      distance: dist,
      elevationDiff: diff,
      slope,
      type,
      kmStart: (totalDistance - dist) / 1000,
      kmEnd: totalDistance / 1000
    });
  }

  const climbs = detectBlocks(segments, "climb");
  const descents = detectBlocks(segments, "descent");

  generateReport({
    totalKm: totalDistance / 1000,
    gain,
    loss,
    terrain,
    profile,
    climbs,
    descents
  });
}

function detectBlocks(segments, mode) {
  const blocks = [];
  let block = null;

  const isMainDirection = s => mode === "climb" ? s.elevationDiff > 0 : s.elevationDiff < 0;
  const minVertical = 50;
  const allowedCounterVertical = 25;

  for (const s of segments) {
    if (!block) {
      if (isMainDirection(s)) {
        block = {
          kmStart: s.kmStart,
          kmEnd: s.kmEnd,
          distance: s.distance,
          vertical: Math.abs(s.elevationDiff),
          counterVertical: 0,
          rawVertical: s.elevationDiff
        };
      }
      continue;
    }

    block.kmEnd = s.kmEnd;
    block.distance += s.distance;
    block.rawVertical += s.elevationDiff;

    if (isMainDirection(s)) {
      block.vertical += Math.abs(s.elevationDiff);
    } else {
      block.counterVertical += Math.abs(s.elevationDiff);
    }

    if (block.counterVertical > allowedCounterVertical) {
      const netVertical = Math.abs(block.rawVertical);

      if (netVertical >= minVertical) {
        block.netVertical = netVertical;
        block.avgSlope = block.rawVertical / block.distance * 100;
        blocks.push(block);
      }

      block = null;
    }
  }

  if (block) {
    const netVertical = Math.abs(block.rawVertical);
    if (netVertical >= minVertical) {
      block.netVertical = netVertical;
      block.avgSlope = block.rawVertical / block.distance * 100;
      blocks.push(block);
    }
  }

  return blocks;
}

function getRaceDurationHours() {
  const h = parseInt(document.getElementById("hours").value || 0);
  const m = parseInt(document.getElementById("minutes").value || 0);
  const s = parseInt(document.getElementById("seconds").value || 0);
  return h + m / 60 + s / 3600;
}

function getRaceType(data) {
  const total = data.totalKm * 1000;

  const upKm =
    (data.terrain["Subida suave"] +
    data.terrain["Subida moderada"] +
    data.terrain["Subida fuerte"]) / 1000;

  const downKm =
    (data.terrain["Bajada suave"] +
    data.terrain["Bajada moderada"] +
    data.terrain["Bajada fuerte"]) / 1000;

  const flatKm = data.terrain["Llano / ondulado"] / 1000;
  const verticalRatio = data.gain / data.totalKm;

  if (verticalRatio > 80 && upKm / data.totalKm > 0.35) {
    return "Trail de montaña muy condicionado por el desnivel positivo";
  }

  if (data.climbs.some(c => c.netVertical > 700)) {
    return "Carrera con grandes ascensiones sostenidas";
  }

  if (data.descents.some(d => d.netVertical > 700)) {
    return "Carrera con bajadas largas y alta exigencia excéntrica";
  }

  if (flatKm / data.totalKm > 0.5) {
    return "Carrera rápida con predominio de terreno corrible";
  }

  if (data.climbs.length >= 5 && data.descents.length >= 5) {
    return "Carrera mixta tipo rompepiernas";
  }

  return "Trail mixto con demandas combinadas";
}

function getPlanning(weeks) {
  if (weeks >= 24) {
    return [
      ["Base general", Math.round(weeks * 0.45), "Construir continuidad, volumen tolerable, fuerza general, capacidad aeróbica y técnica básica."],
      ["Desarrollo específico", Math.round(weeks * 0.32), "Introducir desnivel, subidas largas, bajadas, tiradas específicas y nutrición."],
      ["Preparación competitiva", Math.round(weeks * 0.15), "Simulaciones, bloques clave, estrategia por tramos y ajuste de material."],
      ["Taper", weeks - Math.round(weeks * 0.45) - Math.round(weeks * 0.32) - Math.round(weeks * 0.15), "Reducir fatiga sin perder tono."]
    ];
  }

  if (weeks >= 16) {
    return [
      ["Base orientada", Math.round(weeks * 0.35), "Mantener base aeróbica, fuerza y volumen estable."],
      ["Bloque específico", Math.round(weeks * 0.42), "Priorizar las demandas reales del recorrido."],
      ["Competitivo y taper", weeks - Math.round(weeks * 0.35) - Math.round(weeks * 0.42), "Simular, afinar y descargar."]
    ];
  }

  if (weeks >= 8) {
    return [
      ["Consolidación", Math.round(weeks * 0.25), "Evitar grandes cambios. Asegurar continuidad y fuerza mínima."],
      ["Especificidad prioritaria", Math.round(weeks * 0.5), "Entrenar lo más determinante del recorrido."],
      ["Taper", weeks - Math.round(weeks * 0.25) - Math.round(weeks * 0.5), "Llegar fresco."]
    ];
  }

  return [
    ["Preparación mínima viable", weeks, "No buscar grandes adaptaciones. Priorizar salud, frescura, estrategia, nutrición y material."]
  ];
}

function getSpecificRecommendations(data) {
  const duration = getRaceDurationHours();
  const raceType = getRaceType(data);
  const bigClimbs = data.climbs.filter(c => c.netVertical >= 500).length;
  const bigDescents = data.descents.filter(d => d.netVertical >= 500).length;
  const verticalRatio = data.gain / data.totalKm;

  const recs = [];

  if (bigClimbs > 0) {
    recs.push("Incluir bloques sostenidos en subida de 30-60 minutos, alternando carrera y marcha según la pendiente.");
    recs.push("Practicar el uso de bastones si la carrera tiene ascensiones largas o pendientes superiores al 12-15%.");
  }

  if (bigDescents > 0) {
    recs.push("Programar bajadas largas progresivas para desarrollar tolerancia excéntrica, evitando introducirlas bruscamente.");
    recs.push("Añadir fuerza excéntrica de cuádriceps, sóleo y glúteo medio durante todo el bloque específico.");
  }

  if (verticalRatio > 70) {
    recs.push("Priorizar metros positivos semanales sobre kilómetros totales en parte de la preparación específica.");
  }

  if (duration >= 5) {
    recs.push("Entrenar la nutrición con una pauta objetivo de carbohidratos por hora y comprobar tolerancia digestiva en tiradas largas.");
    recs.push("Diseñar la estrategia de carrera por esfuerzo, no por ritmo: el ritmo pierde valor en recorridos con mucho desnivel.");
  }

  if (duration >= 10) {
    recs.push("Preparar tramos de fatiga acumulada: subir o bajar después de varias horas de entrenamiento, no solo en fresco.");
    recs.push("Incluir simulaciones parciales de material, avituallamientos, sales, cafeína y posibles cambios de temperatura.");
  }

  if (raceType.includes("rompepiernas")) {
    recs.push("Entrenar cambios frecuentes de pendiente con fartleks en terreno ondulado y bloques de subida-bajada repetidos.");
  }

  if (recs.length === 0) {
    recs.push("Priorizar economía de carrera, continuidad aeróbica y sesiones a ritmo controlado en terreno similar al de competición.");
  }

  return recs;
}

function renderProfileChart(profile) {
  const ctx = document.getElementById("profileChart");

  if (profileChart) {
    profileChart.destroy();
  }

  const datasets = [];

  for (let i = 1; i < profile.length; i++) {
    datasets.push({
      label: profile[i].type,
      data: [
        { x: profile[i - 1].km, y: profile[i - 1].ele },
        { x: profile[i].km, y: profile[i].ele }
      ],
      borderColor: terrainColors[profile[i].type],
      backgroundColor: terrainColors[profile[i].type],
      borderWidth: 3,
      pointRadius: 0,
      tension: 0.15,
      showLine: true
    });
  }

  profileChart = new Chart(ctx, {
    type: "scatter",
    data: { datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: context => {
              const p = profile[Math.min(context.dataIndex, profile.length - 1)];
              return `${context.raw.x.toFixed(1)} km · ${context.raw.y.toFixed(0)} m`;
            }
          }
        }
      },
      scales: {
        x: {
          type: "linear",
          title: { display: true, text: "Distancia (km)" }
        },
        y: {
          title: { display: true, text: "Altitud (m)" }
        }
      }
    }
  });
}

function generateReport(data) {
  const weeks = parseInt(document.getElementById("weeks").value || 1);
  const duration = getRaceDurationHours();
  const avgSpeed = data.totalKm / duration;
  const raceType = getRaceType(data);
  const planning = getPlanning(weeks);
  const recommendations = getSpecificRecommendations(data);

  const totalMeters = data.totalKm * 1000;

  const results = document.getElementById("results");

  results.innerHTML = `
    <section class="card">
      <h2>Resumen del recorrido</h2>

      <div class="grid">
        <div class="metric">Distancia<strong>${data.totalKm.toFixed(1)} km</strong></div>
        <div class="metric">Desnivel positivo<strong>${Math.round(data.gain)} m+</strong></div>
        <div class="metric">Desnivel negativo<strong>${Math.round(data.loss)} m-</strong></div>
        <div class="metric">Ratio desnivel<strong>${Math.round(data.gain / data.totalKm)} m+/km</strong></div>
        <div class="metric">Tiempo previsto<strong>${duration.toFixed(2)} h</strong></div>
        <div class="metric">Velocidad media prevista<strong>${avgSpeed.toFixed(2)} km/h</strong></div>
      </div>

      <p><strong>Tipo de carrera:</strong> ${raceType}</p>
    </section>

    <section class="card">
      <h2>Perfil altimétrico coloreado por pendiente</h2>
      <canvas id="profileChart" height="110"></canvas>

      <p class="small">
        Colores: subida suave, moderada y fuerte; llano/ondulado; bajada suave, moderada y fuerte.
      </p>
    </section>

    <section class="card">
      <h2>Distribución del terreno</h2>

      <table>
        <thead>
          <tr>
            <th>Tipo de terreno</th>
            <th>Kilómetros</th>
            <th>Porcentaje</th>
          </tr>
        </thead>
        <tbody>
          ${Object.entries(data.terrain).map(([type, meters]) => `
            <tr>
              <td><span class="tag" style="background:${terrainColors[type]}">${type}</span></td>
              <td>${(meters / 1000).toFixed(2)} km</td>
              <td>${((meters / totalMeters) * 100).toFixed(1)}%</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2>Bloques principales de subida y bajada</h2>

      <h3>Subidas detectadas ≥ 50 m+</h3>
      <table>
        <thead>
          <tr>
            <th>Inicio-fin</th>
            <th>Distancia</th>
            <th>Desnivel neto</th>
            <th>Pendiente media</th>
          </tr>
        </thead>
        <tbody>
          ${data.climbs.length ? data.climbs.map(c => `
            <tr>
              <td>km ${c.kmStart.toFixed(1)} - ${c.kmEnd.toFixed(1)}</td>
              <td>${(c.distance / 1000).toFixed(2)} km</td>
              <td>${Math.round(c.netVertical)} m+</td>
              <td>${Math.abs(c.avgSlope).toFixed(1)}%</td>
            </tr>
          `).join("") : `<tr><td colspan="4">No se detectan subidas relevantes.</td></tr>`}
        </tbody>
      </table>

      <h3>Bajadas detectadas ≥ 50 m-</h3>
      <table>
        <thead>
          <tr>
            <th>Inicio-fin</th>
            <th>Distancia</th>
            <th>Desnivel neto</th>
            <th>Pendiente media</th>
          </tr>
        </thead>
        <tbody>
          ${data.descents.length ? data.descents.map(d => `
            <tr>
              <td>km ${d.kmStart.toFixed(1)} - ${d.kmEnd.toFixed(1)}</td>
              <td>${(d.distance / 1000).toFixed(2)} km</td>
              <td>${Math.round(d.netVertical)} m-</td>
              <td>${Math.abs(d.avgSlope).toFixed(1)}%</td>
            </tr>
          `).join("") : `<tr><td colspan="4">No se detectan bajadas relevantes.</td></tr>`}
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2>Determinantes del rendimiento</h2>

      <p>Para este recorrido, los factores más importantes probablemente serán:</p>

      <ul>
        <li><strong>Resistencia aeróbica específica:</strong> capacidad de sostener esfuerzo durante ${duration.toFixed(1)} horas.</li>
        <li><strong>Fuerza-resistencia en subida:</strong> especialmente relevante si hay bloques largos o mucho m+/km.</li>
        <li><strong>Tolerancia excéntrica:</strong> clave para mantener rendimiento después de bajadas largas.</li>
        <li><strong>Economía de carrera/marcha:</strong> decidir cuándo correr y cuándo caminar puede ahorrar mucha energía.</li>
        <li><strong>Nutrición e hidratación:</strong> determinantes cuanto más se acerque la prueba a formato ultra.</li>
      </ul>
    </section>

    <section class="card">
      <h2>Planificación global recomendada</h2>

      <p>Semanas disponibles: <strong>${weeks}</strong></p>

      <table>
        <thead>
          <tr>
            <th>Fase</th>
            <th>Duración</th>
            <th>Objetivo</th>
          </tr>
        </thead>
        <tbody>
          ${planning.map(p => `
            <tr>
              <td><strong>${p[0]}</strong></td>
              <td>${p[1]} semanas</td>
              <td>${p[2]}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2>Recomendaciones específicas</h2>

      <ul>
        ${recommendations.map(r => `<li>${r}</li>`).join("")}
      </ul>

      <div class="warning">
        Este informe todavía no sustituye una planificación individual. Para hacerlo más preciso habría que cruzarlo con historial de lesiones, disponibilidad semanal, experiencia, datos fisiológicos, material, tolerancia nutricional y objetivo competitivo.
      </div>
    </section>
  `;

  renderProfileChart(data.profile);
}
</script>
</body>
</html>
